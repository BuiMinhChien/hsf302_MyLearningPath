# Server config
server.port=8080
server.servlet.context-path=/ivent
# Application name
spring.application.name=My_Learning_Path

# Datasource config
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=hsf302_final_project;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=sa123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
logging.level.org.springframework.security=DEBUG

# JPA & Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#DEVTOOLS
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true