<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/main-layout}"
>
<head>
    <title>Create Course</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>
<body class="bg-light">

<div layout:fragment="content" class="container py-5">

    <div class="card shadow-sm">
        <div class="card-body p-5">

            <h2 class="mb-4">Course Overview</h2>

            <form th:action="@{/instructor/course/save-overview}"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${course}">

                <input type="hidden" th:field="*{courseVersionId}">

                <!-- Course Title -->
                <div class="mb-4">
                    <label class="form-label">Course Title</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{title}">
                </div>

                <div class="mb-4">
                    <label class="form-label">Course Title</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{subtitle}">
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <label class="form-label">Description</label>

                    <textarea class="form-control"
                              rows="6"
                              th:field="*{description}"></textarea>
                </div>

                <!-- Thumbnail -->
                <div class="mb-4">
                    <label class="form-label">Thumbnail</label>

                    <input type="file"
                           name="thumbnail"
                           class="form-control">
                </div>

                <!-- Tags -->
<!--                <div class="mb-4">-->
<!--                    <label class="form-label">Tags</label>-->

<!--                    <input type="text"-->
<!--                           class="form-control"-->
<!--                           placeholder="java, spring boot, backend"-->
<!--                           th:field="*{tags}">-->
<!--                </div>-->

                <!-- Price -->
                <div class="mb-4">
                    <label class="form-label">Price</label>

                    <input type="number"
                           step="0.01"
                           class="form-control"
                           th:field="*{price}">
                </div>

                <div class="d-flex justify-content-between">

                    <button type="submit"
                            class="btn btn-primary">
                        Save Overview
                    </button>

                    <a th:href="home"
                       class="btn btn-dark">
                        Go To Curriculum
                    </a>

                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
