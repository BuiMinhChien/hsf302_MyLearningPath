<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/main-layout}"
>
<head>

    <title>Curriculum</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between mb-4">
        <h2>Course Curriculum</h2>

        <div>
            <a th:href="@{/instructor/course/{id}/overview(id=${course.id})}"
               class="btn btn-outline-secondary">
                Back To Overview
            </a>

            <form th:action="@{/instructor/course/{id}/submit(id=${course.id})}"
                  method="post"
                  class="d-inline">

                <button class="btn btn-success">
                    Submit For Approval
                </button>

            </form>
        </div>
    </div>

    <!-- Add Section -->
    <button class="btn btn-primary mb-4"
            onclick="addSection()">
        Add Section
    </button>

    <div id="sections-container"></div>

</div>

<script>

    let sectionIndex = 0;

    function addSection() {

        const html = `
        
        <div class="card mb-4 shadow-sm">
            <div class="card-body">

                <div class="mb-3">
                    <label class="form-label">Section Title</label>

                    <input type="text"
                           class="form-control"
                           name="sectionTitle">
                </div>

                <button class="btn btn-outline-primary mb-3"
                        onclick="addLesson(this)">
                    Add Lesson
                </button>

                <div class="lessons-container"></div>

                <button class="btn btn-success mt-3">
                    Save Section
                </button>

            </div>
        </div>
        
        `;

        document.getElementById("sections-container")
            .insertAdjacentHTML("beforeend", html);

        sectionIndex++;
    }

    function addLesson(button) {

        const container = button.parentElement
            .querySelector(".lessons-container");

        const html = `
        
        <div class="border rounded p-3 mb-3">

            <div class="mb-3">
                <label>Lesson Title</label>

                <input type="text"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Lesson Type</label>

                <select class="form-select lesson-type"
                        onchange="changeLessonType(this)">
                        
                    <option value="VIDEO">Video</option>
                    <option value="ARTICLE">Article</option>
                    <option value="QUIZ">Quiz</option>

                </select>
            </div>

            <div class="lesson-content"></div>

        </div>
        
        `;

        container.insertAdjacentHTML("beforeend", html);
    }

    function changeLessonType(select) {

        const content = select.parentElement
            .parentElement
            .querySelector(".lesson-content");

        const type = select.value;

        if (type === "VIDEO") {

            content.innerHTML = `
            
                <div class="mb-3">
                    <label>Upload Video</label>

                    <input type="file"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Upload Script</label>

                    <input type="file"
                           class="form-control">
                </div>
            
            `;
        }

        if (type === "ARTICLE") {

            content.innerHTML = `
            
                <div class="mb-3">
                    <label>Article Content</label>

                    <textarea class="form-control"
                              rows="6"></textarea>
                </div>
            
            `;
        }

        if (type === "QUIZ") {

            content.innerHTML = `
            
                <button type="button"
                        class="btn btn-sm btn-dark mb-3"
                        onclick="addQuizQuestion(this)">
                    Add Question
                </button>

                <div class="quiz-container"></div>
            
            `;
        }
    }

    function addQuizQuestion(button) {

        const container = button.parentElement
            .querySelector(".quiz-container");

        const html = `
        
        <div class="border p-3 mb-3 rounded">

            <div class="mb-3">
                <label>Question</label>

                <input type="text"
                       class="form-control">
            </div>

            <div class="mb-2">
                <input type="checkbox">
                <input type="text"
                       class="form-control d-inline-block w-75"
                       placeholder="Answer 1">
            </div>

            <div class="mb-2">
                <input type="checkbox">
                <input type="text"
                       class="form-control d-inline-block w-75"
                       placeholder="Answer 2">
            </div>

            <div class="mb-2">
                <input type="checkbox">
                <input type="text"
                       class="form-control d-inline-block w-75"
                       placeholder="Answer 3">
            </div>

            <div class="mb-2">
                <input type="checkbox">
                <input type="text"
                       class="form-control d-inline-block w-75"
                       placeholder="Answer 4">
            </div>

        </div>
        
        `;

        container.insertAdjacentHTML("beforeend", html);
    }

</script>

</body>
</html>
