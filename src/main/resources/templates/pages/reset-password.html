<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/main-layout}"
>

<head>
    <title>Đặt lại mật khẩu</title>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
</head>

<body>

<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center align-items-center">
            <div class="col-md-6 col-lg-4">
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-5">
                        <!-- Title -->
                        <div class="text-center mb-4">
                            <div class="mb-3">
                                <i class="bi bi-key-fill fs-1 text-dark"></i>
                            </div>
                            <h2 class="fw-bold mb-2">Đặt lại mật khẩu</h2>
                            <p class="text-muted mb-0">
                                Nhập mật khẩu mới cho tài khoản của bạn
                            </p>
                        </div>

                        <!-- Error Message -->
                        <div
                                th:if="${error}"
                                class="alert alert-danger small fw-semibold mb-3"
                        >
                            <i class="bi bi-exclamation-circle-fill me-1"></i>
                            <span th:text="${error}">Có lỗi xảy ra</span>
                        </div>

                        <!-- Reset Password Form -->
                        <form
                                th:action="@{/reset-password}"
                                method="post"
                        >
                            <!-- Hidden token -->
                            <input type="hidden" name="token" th:value="${token}">

                            <!-- Mật khẩu mới -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Mật khẩu mới
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-lock-fill"></i>
                                    </span>
                                    <input
                                            type="password"
                                            name="newPassword"
                                            id="newPassword"
                                            class="form-control"
                                            placeholder="Nhập mật khẩu mới"
                                            minlength="6"
                                            required
                                    >
                                    <button
                                            class="btn btn-outline-secondary"
                                            type="button"
                                            onclick="togglePassword('newPassword', this)"
                                    >
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Xác nhận mật khẩu -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    Xác nhận mật khẩu
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white">
                                        <i class="bi bi-lock-fill"></i>
                                    </span>
                                    <input
                                            type="password"
                                            name="confirmPassword"
                                            id="confirmPassword"
                                            class="form-control"
                                            placeholder="Nhập lại mật khẩu mới"
                                            minlength="6"
                                            required
                                    >
                                    <button
                                            class="btn btn-outline-secondary"
                                            type="button"
                                            onclick="togglePassword('confirmPassword', this)"
                                    >
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <button
                                    type="submit"
                                    class="btn btn-dark w-100 py-2 rounded-3 fw-semibold"
                            >
                                <i class="bi bi-check-circle me-1"></i>
                                Đặt lại mật khẩu
                            </button>
                        </form>

                        <!-- Back To Login -->
                        <div class="text-center mt-4">
                            <a
                                    th:href="@{/login}"
                                    class="text-decoration-none fw-semibold"
                            >
                                <i class="bi bi-arrow-left me-1"></i>
                                Quay lại đăng nhập
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</th:block>

</body>
</html>
