<!DOCTYPE html>
<html
        lang="vi"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layouts/main-layout}"
>

<head>
    <title>Chi tiết khoá học</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --sidebar-width: 320px;
            --player-bg: #0d0d0d;
            --accent: #a855f7;
            --accent-light: #c084fc;
        }

        /* ── layout ── */
        .course-wrapper {
            display: flex;
            min-height: 100vh;
            height: fit-content;
            overflow: hidden;
        }

        /* ── main (left) ── */
        .course-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* top half – lesson viewer */
        .lesson-viewer {
            height: 600px;
            flex: none;
            background: var(--player-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* video player */
        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        /* article pane */
        #articlePane {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 2rem;
            background: #fff;
            color: #1a1a2e;
        }

        /* quiz pane */
        #quizPane {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 2rem;
            background: #fff;
        }

        .placeholder-lesson {
            text-align: center;
            color: #6c757d;
        }
        .placeholder-lesson i { font-size: 4rem; }

        /* bottom half – tabs */
        .course-tabs {
            flex: 0 0 50%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fff;
        }

        .course-tabs .nav-tabs { flex-shrink: 0; border-bottom: 2px solid #e9ecef; }
        .course-tabs .tab-content { flex: 1; overflow-y: auto; }

        .lesson-item {
            cursor: pointer;
            padding: .6rem 1rem .6rem 1.5rem;
            border-bottom: 1px solid #f0f0f0;
            transition: background .15s;
            font-size: .85rem;
        }
        .lesson-item:hover { background: #ede9fe; }
        .lesson-item.active { background: #ede9fe; border-left: 3px solid var(--accent); color: var(--accent); }

        .lesson-icon { width: 20px; text-align: center; }

        /* ── quiz styles ── */
        .quiz-question-card { border-left: 4px solid var(--accent); }

        .answer-option input[type="radio"],
        .answer-option input[type="checkbox"] { display: none; }

        .answer-option label {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .5rem .75rem;
            border: 1.5px solid #dee2e6;
            border-radius: .5rem;
            cursor: pointer;
            transition: all .15s;
            font-size: .9rem;
        }
        .answer-option label:hover { border-color: var(--accent); background: #fdf4ff; }
        .answer-option input:checked + label { border-color: var(--accent); background: #ede9fe; color: var(--accent); font-weight: 500; }

        .answer-option label.correct { border-color: #198754 !important; background: #d1e7dd !important; color: #155724 !important; }
        .answer-option label.wrong   { border-color: #dc3545 !important; background: #f8d7da !important; color: #721c24 !important; }

        /* ── star rating ── */
        .star-rating .bi-star-fill { color: #f59e0b; }
        .star-rating .bi-star      { color: #d1d5db; }

        /* ── comment avatar ── */
        .comment-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* scrollbar thin */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 3px; }

        @media (max-width: 768px) {
            .course-wrapper { flex-direction: column; height: auto; }
            .lesson-viewer  { min-height: 220px; }
        }
    </style>
</head>

<body>
<div layout:fragment="content">
    <div class="course-wrapper">
        <!-- ═══════════════ MAIN AREA ═══════════════ -->
        <div class="course-main">
            <!-- ───── TOP HALF: Lesson Viewer ───── -->
            <div class="lesson-viewer" id="lessonViewer">

                <!-- Video player (HLS) -->
                <video id="videoPlayer" controls></video>

                <!-- Article pane -->
                <div id="articlePane"></div>

                <!-- Quiz pane -->
                <div id="quizPane"></div>

                <!-- Placeholder khi chưa chọn bài -->
                <div id="placeholderLesson" class="placeholder-lesson">
                    <i class="bi bi-play-circle text-secondary"></i>
                    <p class="mt-3 text-secondary fs-6">Chọn một bài học để bắt đầu</p>
                </div>
            </div>

            <!-- ───── BOTTOM HALF: Tabs ───── -->
            <div class="course-tabs">
                <ul class="nav nav-tabs px-3 pt-2" id="courseTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabContent" type="button">
                            <i class="bi bi-list-ul me-1"></i>Nội dung
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabOverview" type="button">
                            <i class="bi bi-info-circle me-1"></i>Tổng quan
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabComments" type="button">
                            <i class="bi bi-chat-dots me-1"></i>Bình luận
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabReviews" type="button">
                            <i class="bi bi-star me-1"></i>Đánh giá
                        </button>
                    </li>
                </ul>

                <div class="tab-content p-3">

                    <!-- ── Tab: Nội dung khoá học ── -->
                    <div class="tab-pane fade show active" id="tabContent">
                        <div class="accordion accordion-flush" id="courseAccordion"
                             th:with="course=${course}">

                            <div class="accordion-item mb-2 border rounded"
                                 th:each="section, sIdx : ${course.sections}">

                                <h2 class="accordion-header">
                                    <button class="accordion-button fw-semibold"
                                            type="button"
                                            data-bs-toggle="collapse"
                                            th:data-bs-target="'#section-' + ${section.id}"
                                            th:aria-expanded="${sIdx.index == 0}"
                                            th:classappend="${sIdx.index != 0} ? 'collapsed'">
                                        <span class="me-2 text-secondary small"
                                              th:text="${section.displayOrder} + '.'"></span>
                                        <span th:text="${section.title}"></span>
                                        <span class="ms-auto badge bg-light text-dark border small"
                                              th:text="${#lists.size(section.lessons)} + ' bài'"></span>
                                    </button>
                                </h2>

                                <div th:id="'section-' + ${section.id}"
                                     th:classappend="${sIdx.index == 0} ? 'show' : ''"
                                     class="accordion-collapse collapse"
                                     data-bs-parent="#courseAccordion">
                                    <div class="accordion-body p-0">

                                        <div class="lesson-item d-flex align-items-center gap-2"
                                             th:each="lesson : ${section.lessons}"
                                             th:data-lesson-id="${lesson.id}"
                                             th:data-type="${lesson.type}"
                                             th:data-video-url="${lesson.videoUrl}"
                                             th:data-subtitle-url="${lesson.subtitleUrl}"
                                             th:data-article="${lesson.articleContent}"
                                             th:data-questions="${lesson.questions != null ? #strings.escapeXml(#strings.toString(lesson.questions)) : ''}"
                                             th:attr="data-questions-json=${lesson.questions != null} ? ${#strings.toString(lesson.questions)}"
                                             onclick="selectLesson(this)">

                                            <span class="lesson-icon">
                                                <i th:classappend="${lesson.type == 'VIDEO'} ? 'bi-play-circle text-primary' : (${lesson.type == 'ARTICLE'} ? 'bi-file-text text-success' : 'bi-patch-question text-warning')"
                                                   class="bi"></i>
                                            </span>
                                            <span th:text="${lesson.displayOrder} + '. ' + ${lesson.title}"></span>
                                            <span class="ms-auto badge text-bg-light"
                                                  th:text="${lesson.type}"></span>
                                        </div>

                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- ── Tab: Tổng quan khoá học ── -->
                    <div class="tab-pane fade" id="tabOverview">
                        <div th:with="course=${course}">
                            <div class="d-flex align-items-center gap-3 mb-4">
                                <img th:src="${course.thumbnailUrl}"
                                     th:onerror="this.src='https://via.placeholder.com/120x80?text=No+Image'"
                                     class="rounded" style="width:120px;height:80px;object-fit:cover;" alt="thumbnail">
                                <div>
                                    <h5 class="mb-1 fw-bold" th:text="${course.title}"></h5>
                                    <p class="text-muted small mb-1" th:text="${course.subtitle}"></p>
                                    <div class="d-flex gap-3 small">
                                        <span><i class="bi bi-people-fill text-primary"></i>
                                            <span th:text="${course.totalStudents}"></span> học viên</span>
                                        <span><i class="bi bi-star-fill text-warning"></i>
                                            <span th:text="${course.averageRating}"></span>
                                            (<span th:text="${course.totalReviews}"></span> đánh giá)</span>
                                    </div>
                                </div>
                            </div>

                            <h6 class="fw-semibold">Mô tả khoá học</h6>
                            <p class="text-secondary" th:text="${course.description}"></p>

                            <hr>
                            <h6 class="fw-semibold">Giảng viên</h6>
                            <div class="d-flex align-items-center gap-3">
                                <img th:if="${course.instructorAvatarUrl != null}"
                                     th:src="${course.instructorAvatarUrl}"
                                     class="rounded-circle" width="48" height="48" alt="avatar">
                                <div class="comment-avatar" th:if="${course.instructorAvatarUrl == null}"
                                     th:text="${#strings.toUpperCase(#strings.substring(course.instructorName,0,1))}"></div>
                                <div>
                                    <div class="fw-semibold" th:text="${course.instructorName}"></div>
                                    <div class="text-muted small" th:text="${course.instructorEmail}"></div>
                                </div>
                            </div>

                            <hr>
                            <h6 class="fw-semibold">Học phí</h6>
                            <p class="fs-5 fw-bold text-purple"
                               style="color: var(--accent);"
                               th:text="${#numbers.formatDecimal(course.price,0,'COMMA',0,'POINT')} + ' ₫'"></p>
                        </div>
                    </div>

                    <!-- ── Tab: Bình luận ── -->
                    <div class="tab-pane fade" id="tabComments">

                        <!-- Form gửi bình luận -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">Viết bình luận</label>
                            <textarea class="form-control form-control-sm mb-2"
                                      id="commentInput" rows="2"
                                      placeholder="Nhập bình luận của bạn…"></textarea>
                            <button class="btn btn-sm btn-primary" onclick="submitComment()">
                                <i class="bi bi-send me-1"></i>Gửi
                            </button>
                        </div>

                        <div id="commentList">
                            <!-- Bình luận mẫu -->
                            <div class="d-flex gap-3 mb-3">
                                <div class="comment-avatar">N</div>
                                <div>
                                    <div class="fw-semibold small">Nguyễn Văn A</div>
                                    <p class="mb-0 text-secondary small">Khoá học rất hay, giảng viên giảng dễ hiểu!</p>
                                    <span class="text-muted" style="font-size:.75rem;">2 giờ trước</span>
                                </div>
                            </div>
                            <div class="d-flex gap-3 mb-3">
                                <div class="comment-avatar" style="background:#10b981;">T</div>
                                <div>
                                    <div class="fw-semibold small">Trần Thị B</div>
                                    <p class="mb-0 text-secondary small">Nội dung bài tập rất thực tế.</p>
                                    <span class="text-muted" style="font-size:.75rem;">1 ngày trước</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ── Tab: Đánh giá ── -->
                    <div class="tab-pane fade" id="tabReviews">

                        <!-- Tổng quan đánh giá -->
                        <div class="d-flex align-items-center gap-4 mb-4 p-3 bg-light rounded">
                            <div class="text-center">
                                <div class="display-4 fw-bold text-warning"
                                     th:text="${course.averageRating}">0.0</div>
                                <div class="star-rating">
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star"></i>
                                </div>
                                <small class="text-muted"
                                       th:text="${course.totalReviews} + ' đánh giá'">0 đánh giá</small>
                            </div>
                            <div class="flex-grow-1">
                                <div th:each="star : ${#numbers.sequence(5,1,-1)}"
                                     class="d-flex align-items-center gap-2 mb-1">
                                    <span class="small text-nowrap" th:text="${star} + ' ★'"></span>
                                    <div class="progress flex-grow-1" style="height:8px;">
                                        <div class="progress-bar bg-warning" style="width: 0%"></div>
                                    </div>
                                    <span class="small text-muted">0</span>
                                </div>
                            </div>
                        </div>

                        <!-- Form gửi đánh giá -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">Đánh giá của bạn</label>
                            <div class="d-flex gap-1 mb-2" id="starPicker">
                                <i class="bi bi-star-fill text-warning fs-4" style="cursor:pointer;"
                                   th:each="i : ${#numbers.sequence(1,5)}"
                                   th:attr="data-val=${i}"></i>
                            </div>
                            <textarea class="form-control form-control-sm mb-2" rows="2"
                                      placeholder="Chia sẻ cảm nhận của bạn…"></textarea>

                                <i class="bi bi-send me-1"></i>Gửi đánh giá
                            </button>

    <!-- ══════════ QUIZ DATA (hidden, read by JS) ══════════
         Thymeleaf serializes toàn bộ questions dưới dạng JSON
         vào data attribute của từng lesson-item.
         Đây là cách an toàn nhất với Spring + Thymeleaf.
    -->
    <script th:inline="javascript">
        /*<![CDATA[*/

        // ─── HLS Player ────────────────────────────────────────
        let hls = null;

        function loadHLS(src, subtitleSrc) {
            const video = document.getElementById('videoPlayer');

            video.querySelectorAll('track').forEach(t => t.remove());

            // ✅ Bắt buộc phải có để browser gửi Origin header khi fetch track
            video.crossOrigin = 'anonymous';

            if (hls) { hls.destroy(); hls = null; }

            if (subtitleSrc) {
                const track = document.createElement('track');
                track.kind = 'subtitles';
                track.label = 'Phụ đề';
                track.srclang = 'vi';
                track.src = subtitleSrc;
                track.default = true;
                video.appendChild(track);
            }

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(src);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                    setTimeout(() => {
                        if (video.textTracks.length > 0) {
                            video.textTracks[0].mode = 'showing';
                        }
                    }, 300);
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = src;
                video.play().catch(() => {});
            }
        }

        // ─── Lesson selector ───────────────────────────────────
        function selectLesson(el) {
            // highlight active
            document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll(`[data-lesson-id="${el.dataset.lessonId}"]`)
                .forEach(i => i.classList.add('active'));

            const type       = el.dataset.type;
            const videoUrl   = el.dataset.videoUrl;
            const subtitleUrl = el.dataset.subtitleUrl;
            const article    = el.dataset.article;

            const videoEl       = document.getElementById('videoPlayer');
            const articleEl     = document.getElementById('articlePane');
            const quizEl        = document.getElementById('quizPane');
            const placeholderEl = document.getElementById('placeholderLesson');

            // hide all
            videoEl.style.display       = 'none';
            articleEl.style.display     = 'none';
            quizEl.style.display        = 'none';
            placeholderEl.style.display = 'none';

            if (type === 'VIDEO') {
                videoEl.style.display = 'block';
                loadHLS(videoUrl, subtitleUrl || null);
            } else if (type === 'ARTICLE') {
                articleEl.style.display = 'block';
                articleEl.innerHTML = article || '<p class="text-muted">Không có nội dung.</p>';
            } else if (type === 'QUIZ') {
                quizEl.style.display = 'block';
                renderQuiz(el.dataset.lessonId, quizEl);
            }
        }

        // ─── Quiz renderer ─────────────────────────────────────
        // Thymeleaf injects the full sections JSON so we can look up questions
        const courseData = /*[[${course}]]*/ {};

        function renderQuiz(lessonId, container) {
            // Find lesson in courseData
            let questions = [];
            if (courseData && courseData.sections) {
                outer:
                    for (const sec of courseData.sections) {
                        for (const les of sec.lessons) {
                            if (String(les.id) === String(lessonId)) {
                                questions = les.questions || [];
                                break outer;
                            }
                        }
                    }
            }

            if (!questions.length) {
                container.innerHTML = '<p class="text-muted">Không có câu hỏi nào.</p>';
                return;
            }

            let html = `<h6 class="fw-bold mb-3"><i class="bi bi-patch-question-fill text-warning me-2"></i>Bài kiểm tra</h6>`;
            questions.forEach((q, qi) => {
                const multi = q.answers.filter(a => a.correct).length > 1;
                html += `
            <div class="card quiz-question-card mb-3 p-3">
                <p class="fw-semibold mb-2">${qi + 1}. ${q.questionText}</p>
                ${multi ? '<small class="text-muted mb-2 d-block">Chọn tất cả đáp án đúng</small>' : ''}
                <div class="d-flex flex-column gap-2">
                    ${q.answers.map((a, ai) => `
                    <div class="answer-option">
                        <input type="${multi ? 'checkbox' : 'radio'}"
                               name="q${q.id}"
                               id="q${q.id}_a${a.id}"
                               value="${a.id}"
                               data-correct="${a.correct}">
                        <label for="q${q.id}_a${a.id}">
                            <span class="badge bg-light text-dark border">${String.fromCharCode(65+ai)}</span>
                            ${a.text}
                        </label>
                    </div>`).join('')}
                </div>
                <button class="btn btn-sm btn-outline-primary mt-3 align-self-start"
                        onclick="checkAnswer(this, ${q.id})">
                    <i class="bi bi-check2-circle me-1"></i>Kiểm tra
                </button>
                <div class="quiz-result mt-2" id="result-${q.id}"></div>
            </div>`;
            });

            container.innerHTML = html;
        }

        function checkAnswer(btn, questionId) {
            const inputs = btn.closest('.card').querySelectorAll('input');
            const resultEl = document.getElementById('result-' + questionId);
            let allCorrect = true;
            let anySelected = false;

            inputs.forEach(inp => {
                const lbl = document.querySelector(`label[for="${inp.id}"]`);
                lbl.classList.remove('correct', 'wrong');
                if (inp.checked) {
                    anySelected = true;
                    if (inp.dataset.correct === 'true') { lbl.classList.add('correct'); }
                    else { lbl.classList.add('wrong'); allCorrect = false; }
                } else {
                    if (inp.dataset.correct === 'true') allCorrect = false;
                }
            });

            if (!anySelected) {
                resultEl.innerHTML = '<small class="text-muted">Vui lòng chọn ít nhất một đáp án.</small>';
                return;
            }

            resultEl.innerHTML = allCorrect
                ? '<small class="text-success fw-semibold"><i class="bi bi-check-circle-fill me-1"></i>Chính xác!</small>'
                : '<small class="text-danger fw-semibold"><i class="bi bi-x-circle-fill me-1"></i>Chưa đúng, thử lại nhé!</small>';
        }

        // ─── Comment submit ────────────────────────────────────
        function submitComment() {
            const input = document.getElementById('commentInput');
            const text  = input.value.trim();
            if (!text) return;

            const div = document.createElement('div');
            div.className = 'd-flex gap-3 mb-3';
            div.innerHTML = `
            <div class="comment-avatar" style="background:#6366f1;">B</div>
            <div>
                <div class="fw-semibold small">Bạn</div>
                <p class="mb-0 text-secondary small">${escapeHtml(text)}</p>
                <span class="text-muted" style="font-size:.75rem;">Vừa xong</span>
            </div>`;
            document.getElementById('commentList').prepend(div);
            input.value = '';
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        /*]]>*/
    </script>

</div>
</body>
</html>
